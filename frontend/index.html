<!DOCTYPE html>
<html>
<head>
<title>Sympto AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body {
    display:flex;
    height:100vh;
    background:#f7f9fc;
}

/* SIDEBAR */
.sidebar {
    width:260px;
    background:#ffffff;
    padding:25px 20px;
    border-right:1px solid #eee;
}

.sidebar h2 {
    font-size:18px;
    margin-bottom:25px;
}

.sidebar button {
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#eef4ff;
    color:#0d47a1;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
}

.sidebar button:hover {
    background:#dce8ff;
}

/* MAIN */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header {
    height:70px;
    background:#ffffff;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
}

.header h1 {
    font-size:20px;
    font-weight:600;
}

.header button {
    background:#0d47a1;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

/* CHAT AREA */
.chat {
    flex:1;
    padding:30px;
    overflow-y:auto;
}

/* MESSAGE */
.message {
    display:flex;
    margin-bottom:15px;
}

.user {
    justify-content:flex-end;
}

.ai {
    justify-content:flex-start;
}

.bubble {
    max-width:60%;
    padding:14px 16px;
    border-radius:14px;
    font-size:14px;
    line-height:1.5;
}

/* USER MESSAGE */
.user .bubble {
    background:#0d47a1;
    color:white;
    border-bottom-right-radius:4px;
}

/* AI MESSAGE */
.ai .bubble {
    background:white;
    border:1px solid #eee;
    border-bottom-left-radius:4px;
}

/* DISEASE CARDS */
.card {
    background:white;
    border:1px solid #eee;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    font-size:14px;
}

.card b {
    display:block;
    margin-bottom:5px;
}

/* INPUT BAR */
.input {
    padding:15px;
    border-top:1px solid #eee;
    background:white;
    display:flex;
    gap:10px;
}

.input input {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

.input button {
    background:#0d47a1;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
}

/* LOADER */
.loader {
    width:20px;
    height:20px;
    border:3px solid #eee;
    border-top:3px solid #0d47a1;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Quick Symptoms</h2>
    <button onclick="fill('fever')">Fever</button>
    <button onclick="fill('headache')">Headache</button>
    <button onclick="fill('cough')">Cough</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1>🩺 Sympto AI</h1>
        <button onclick="download()">Download Report</button>
    </div>

    <!-- CHAT -->
    <div id="chat" class="chat"></div>

    <!-- INPUT -->
    <div class="input">
        <input id="input" placeholder="Describe your symptoms..." onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
const API = "https://your-render-url.onrender.com";

let lastResponse = "", lastSymptoms = "";

function fill(text){
    document.getElementById("input").value = text;
}

function addMessage(text, role){
    let div = document.createElement("div");
    div.className = "message " + role;

    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = text.replace(/\n/g,"<br>");

    div.appendChild(bubble);
    document.getElementById("chat").appendChild(div);

    document.getElementById("chat").scrollTop = 999999;
}

function addLoader(){
    let div = document.createElement("div");
    div.className = "message ai";

    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="loader"></div>`;

    div.appendChild(bubble);
    document.getElementById("chat").appendChild(div);

    return div;
}

function showDiseases(d){
    d.forEach(x=>{
        let card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<b>${x.disease}</b>Confidence: ${x.confidence*100}%`;
        document.getElementById("chat").appendChild(card);
    });
}

async function send(){
    let input = document.getElementById("input").value.trim();
    if(!input) return;

    addMessage(input,"user");
    document.getElementById("input").value = "";

    let loader = addLoader();

    try {
        const res = await fetch(API + "/analyze", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({symptoms:input})
        });

        const data = await res.json();

        loader.remove();

        if(data.error){
            addMessage("Error: "+data.error,"ai");
            return;
        }

        lastResponse = data.response;
        lastSymptoms = input;

        addMessage(data.response,"ai");
        showDiseases(data.diseases);

    } catch {
        loader.remove();
        addMessage("Server error. Try again.","ai");
    }
}

async function download(){
    if(!lastResponse) return alert("No report yet");

    const res = await fetch(API+"/download",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            symptoms:lastSymptoms,
            response:lastResponse
        })
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "report.pdf";
    a.click();
}
</script>

</body>
</html>
