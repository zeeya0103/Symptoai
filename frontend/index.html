<!DOCTYPE html>
<html>
<head>
<title>Sympto AI</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

input {
    padding: 10px;
    width: 60%;
}

button {
    padding: 10px;
    margin: 5px;
}

#output {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>🩺 Sympto AI</h2>

<input id="input" placeholder="Type or speak symptoms">
<br>

<button onclick="startVoice()">🎤 Speak</button>
<button onclick="send()">Analyze</button>
<button onclick="download()">Download Report</button>

<div id="output"></div>

<script>
const API = "https://your-backend-url.onrender.com";

let lastResponse = "";
let lastSymptoms = "";

// 🎤 VOICE INPUT
function startVoice(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Voice not supported");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-IN";

    recognition.start();

    recognition.onresult = function(event){
        let text = event.results[0][0].transcript;
        document.getElementById("input").value = text;
    };
}

// 🔍 ANALYZE
async function send(){
    let input = document.getElementById("input").value;

    const res = await fetch(API + "/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({symptoms:input})
    });

    const data = await res.json();

    lastResponse = data.response;
    lastSymptoms = input;

    document.getElementById("output").innerText = data.response;
}

// 📄 DOWNLOAD
async function download(){
    const res = await fetch(API + "/download", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            symptoms:lastSymptoms,
            response:lastResponse
        })
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "report.pdf";
    a.click();
}
</script>

</body>
</html>
